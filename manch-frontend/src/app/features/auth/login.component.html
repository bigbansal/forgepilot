<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <h1 class="login-card__title">Manch</h1>
      <p class="login-card__subtitle">{{ mode() === 'login' ? 'Sign in to your workspace' : 'Create an account' }}</p>
    </div>

    <form class="login-card__form" (ngSubmit)="submit()" #f="ngForm">

      @if (mode() === 'register') {
        <div class="form-group">
          <label for="fullName">Full name (optional)</label>
          <input
            id="fullName"
            type="text"
            [(ngModel)]="fullName"
            name="fullName"
            placeholder="Ada Lovelace"
            autocomplete="name"
          />
        </div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="{{ mode() === 'login' ? 'current-password' : 'new-password' }}"
        />
      </div>

      @if (error()) {
        <p class="login-card__error">{{ error() }}</p>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Please wait…' : mode() === 'login' ? 'Sign in' : 'Create account' }}
      </button>
    </form>

    <p class="login-card__toggle">
      {{ mode() === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button type="button" class="link-btn" (click)="toggleMode()">
        {{ mode() === 'login' ? 'Register' : 'Sign in' }}
      </button>
    </p>
  </div>
</div>
