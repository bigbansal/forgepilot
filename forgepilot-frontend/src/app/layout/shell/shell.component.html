<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">FP</span>
      <span class="brand-name">ForgePilot</span>
    </div>

    <div class="nav-menu">
      <a routerLink="/chat" routerLinkActive="is-active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Chat
      </a>
      <a routerLink="/dashboard" routerLinkActive="is-active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a routerLink="/tasks" routerLinkActive="is-active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Tasks
      </a>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-footer">
      @if (currentUser(); as user) {
        <div class="user-row">
          <div class="user-avatar">{{ (user.full_name || user.email)[0].toUpperCase() }}</div>
          <span class="user-name">{{ user.full_name || user.email.split('@')[0] }}</span>
        </div>
        <button class="btn-signout" type="button" (click)="logout()" title="Sign out">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      }
    </div>
  </aside>

  <!-- Main area -->
  <div class="main">
    <header class="toolbar">
      <div class="toolbar-left">
        <span class="live-dot">&#x25cf;</span>
        <span class="live-label">Live</span>
      </div>
      <div class="toolbar-right">
        <!-- Theme toggle -->
        <button
          class="btn-icon"
          type="button"
          (click)="theme.toggle()"
          [title]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
          aria-label="Toggle theme">
          <!-- Sun icon (show when dark → switch to light) -->
          <svg *ngIf="theme.isDark()" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <!-- Moon icon (show when light → switch to dark) -->
          <svg *ngIf="theme.isLight()" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <!-- Notifications -->
        <button class="btn-icon bell" (click)="notifications.toggleDrawer()" type="button" aria-label="Notifications">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="count" *ngIf="unreadCount() > 0">{{ unreadCount() }}</span>
        </button>
      </div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>

    <!-- Notification drawer -->
    <aside class="drawer" [class.open]="notifications.drawerOpen()">
      <div class="drawer-hd">
        <span class="drawer-title">Notifications</span>
        <div class="drawer-actions">
          <button type="button" (click)="notifications.markAllRead()">Mark all read</button>
          <button type="button" class="drawer-close" (click)="notifications.closeDrawer()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="drawer-list" *ngIf="notifications.items().length; else empty">
        <article class="notice" *ngFor="let item of notifications.items()" [class.read]="item.read">
          <strong>{{ item.title }}</strong>
          <p>{{ item.detail }}</p>
          <small>{{ item.createdAt | date: 'shortTime' }}</small>
        </article>
      </div>

      <ng-template #empty>
        <p class="drawer-empty">No notifications yet.</p>
      </ng-template>
    </aside>
  </div>
</div>
