<div class="chat-layout">

  <!-- Conversation sidebar -->
  <aside class="conv-list">
    <div class="conv-list-hd">
      <span class="conv-list-title">Conversations</span>
      <button type="button" class="btn-new" (click)="newChat()" title="New chat">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
    </div>

    <div class="conv-items" *ngIf="conversations().length; else noConvs">
      <button
        type="button"
        class="conv-item"
        *ngFor="let item of conversations()"
        (click)="openConversation(item.id)"
        [class.active]="activeConversation()?.id === item.id">
        <span class="conv-title">{{ item.title }}</span>
        <span class="conv-status" [attr.data-s]="item.latestTaskStatus">{{ item.latestTaskStatus || 'idle' }}</span>
      </button>
    </div>

    <ng-template #noConvs>
      <div class="conv-empty">
        <p>No conversations yet</p>
      </div>
    </ng-template>
  </aside>

  <!-- Thread panel -->
  <section class="thread">

    <!-- Thread header -->
    <header class="thread-hd">
      <div class="thread-hd-left">
        <span class="thread-title">{{ activeConversation()?.title || 'Chat' }}</span>
        <fp-status-badge [label]="streamStatus()" />
      </div>
      <div class="thread-controls">
        <div class="ctrl-group">
          <label class="ctrl-label">Runner</label>
          <select [(ngModel)]="selectedRunner">
            <option value="agent-pipeline">⚡ Agent Pipeline (Phase 2)</option>
            <option value="opensandbox">OpenSandbox</option>
            <option value="gemini-cli">Gemini CLI</option>
            <option value="codex-cli">Codex CLI</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">Mode</label>
          <select [(ngModel)]="selectedApprovalMode">
            <option value="yolo">Auto</option>
            <option value="auto_edit">Supervised</option>
            <option value="plan">Plan only</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Error bar -->
    <div class="error-bar" *ngIf="loadError">{{ loadError }}</div>

    <!-- Messages -->
    <div class="messages" *ngIf="hasMessages(); else emptyThread">
      <div
        *ngFor="let message of activeConversation()?.messages"
        class="msg-row"
        [class.row-user]="message.role === 'user'"
        [class.row-assistant]="message.role === 'assistant'"
        [class.row-system]="message.role === 'system'">

        <!-- System note -->
        <div *ngIf="message.role === 'system'" class="sys-note">
          {{ message.content }}
          &nbsp;<time>{{ message.createdAt | date: 'shortTime' }}</time>
        </div>

        <!-- Assistant / user bubble -->
        <ng-container *ngIf="message.role !== 'system'">
          <div *ngIf="message.role === 'assistant'" class="msg-avatar">FP</div>
          <div class="msg-bubble">
            <pre>{{ message.content }}</pre>
            <time>{{ message.createdAt | date: 'shortTime' }}</time>
          </div>
        </ng-container>
      </div>
    </div>

    <ng-template #emptyThread>
      <div class="thread-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Describe an engineering task to get started.</p>
      </div>
    </ng-template>

    <!-- Typing indicator -->
    <div class="typing-row" *ngIf="isSending">
      <div class="msg-avatar">FP</div>
      <fp-typing-indicator />
    </div>

    <!-- Agent thoughts terminal -->
    <div class="agent-panel" *ngIf="activeLogs().length > 0 || activeConversation()?.latestTaskStatus === 'RUNNING'">
      <button type="button" class="agent-panel-hd" (click)="logsExpanded.set(!logsExpanded())">
        <span class="agent-dot" [class.running]="activeConversation()?.latestTaskStatus === 'RUNNING'">&#x25cf;</span>
        <span>{{ activeConversation()?.latestTaskStatus === 'RUNNING' ? 'Agent running…' : 'Agent output' }}</span>
        <span class="agent-lines">{{ activeLogs().length }} lines</span>
        <span class="expand-icon">{{ logsExpanded() ? '▾' : '▸' }}</span>
      </button>
      <div class="agent-terminal" *ngIf="logsExpanded()">
        <div class="log-line" *ngFor="let line of activeLogs()">{{ line }}</div>
        <span class="log-cursor" *ngIf="activeConversation()?.latestTaskStatus === 'RUNNING'">█</span>
      </div>
    </div>

    <!-- Composer -->
    <footer class="composer">
      <textarea
        [(ngModel)]="prompt"
        rows="2"
        placeholder="Describe your request…  (Ctrl+↩ to send)"
        (keydown.control.enter)="send()"
        (keydown.meta.enter)="send()">
      </textarea>
      <button
        type="button"
        class="send-btn"
        (click)="send()"
        [disabled]="isSending || !prompt.trim()"
        title="Send (Ctrl+Enter)">
        <svg *ngIf="!isSending" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <svg *ngIf="isSending" class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" opacity=".2"/><path d="M22 12a10 10 0 0 0-10-10"/></svg>
      </button>
    </footer>

  </section>
</div>
