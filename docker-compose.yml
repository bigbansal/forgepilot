services:
  postgres:
    image: postgres:16-alpine
    container_name: manch-postgres
    environment:
      POSTGRES_DB: ${MANCH_POSTGRES_DB:-manch}
      POSTGRES_USER: ${MANCH_POSTGRES_USER:-manch}
      POSTGRES_PASSWORD: ${MANCH_POSTGRES_PASSWORD:-manch_secret}
    ports:
      - "${MANCH_DB_PORT:-5545}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manch"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: manch-rabbitmq
    ports:
      - "5672:5672"
      - "15899:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${MANCH_RABBITMQ_USER:-manch}
      RABBITMQ_DEFAULT_PASS: ${MANCH_RABBITMQ_PASSWORD:-manch_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: manch-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox-runtime:
    build:
      context: ./opensandbox-runtime
      dockerfile: Dockerfile
    image: manch/sandbox-runtime:local
    container_name: manch-sandbox-runtime
    command: ["sh", "-lc", "sleep infinity"]

  opensandbox:
    build:
      context: ./opensandbox-server
      dockerfile: Dockerfile
    container_name: manch-opensandbox
    depends_on:
      - sandbox-runtime
    ports:
      - "3201:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./manch-backend
      dockerfile: Dockerfile
    container_name: manch-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      opensandbox:
        condition: service_healthy
    ports:
      - "8212:8080"
    env_file:
      - ./manch-backend/.env
    environment:
      MANCH_HOST: 0.0.0.0
      MANCH_PORT: 8080
      MANCH_API_PREFIX: /api/v1
      MANCH_PUBLIC_BASE_URL: http://localhost:8212
      MANCH_DATABASE_URL: postgresql+psycopg://${MANCH_POSTGRES_USER:-manch}:${MANCH_POSTGRES_PASSWORD:-manch_secret}@postgres:5432/${MANCH_POSTGRES_DB:-manch}
      MANCH_OPENSANDBOX_BASE_URL: http://opensandbox:8080
      MANCH_OPENSANDBOX_IMAGE_URI: manch/sandbox-runtime:local
      MANCH_OPENSANDBOX_USE_SERVER_PROXY: "true"
    volumes:
      # Bind-mount host skill directories into the backend container so that
      # SKILL.md files written by Manch appear in the local CLI skill paths.
      # Created automatically if they don't exist (Docker creates them as dirs).
      - ~/.codex/skills:/root/.codex/skills
      - ~/.gemini/skills:/root/.gemini/skills

  frontend:
    build:
      context: ./manch-frontend
      dockerfile: Dockerfile
    container_name: manch-frontend
    depends_on:
      - backend
    ports:
      - "4401:4200"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: manch_default
